

services:
  postgres:
    image: postgres:16
    container_name: async_jobs_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: async_jobs
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: async_jobs_redis
    ports:
      - "6379:6379"

volumes:
  pg_data: